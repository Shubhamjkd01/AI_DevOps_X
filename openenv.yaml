name: AI_DevOps_Agent
version: 1.0.0
description: Autonomous CI/CD Fixer Agent that repairs regressions and submits Pull Requests.
entrypoint: inference.py
dependencies:
  - requirements.txt
model:
  type: language-model
  name: ${MODEL_NAME}
environment:
  containerized: true
endpoints:
  reset: /reset
  step: /step
  state: /state
observation_space:
  type: json
  schema:
    system_state: string
    ci_logs: string
    target_files: array of string
action_space:
  type: json
  schema:
    action_type: string
    file_path: string (optional)
    patch_content: string (optional)
tasks:
  - id: fix_ci_workflow
    description: Solve the AST syntax issue dynamically.
    grader: learning.grader:openenv_task1_grader
  - id: dependency_conflict
    description: Upgrade missing pipeline requirements.
    grader: learning.grader:openenv_task2_grader
  - id: code_regression
    description: Repair the destructive PR logic.
    grader: learning.grader:openenv_task3_grader
